name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: input
    id: summary
    attributes:
      label: Feature Summary
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem this solves
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
    validations:
      required: true
  - type: dropdown
    id: complexity
    attributes:
      label: Estimated Complexity
      options:
        - Beginner (good first issue)
        - Intermediate
        - Advanced
